<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대건고 열품타</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Favicon (Orange Flame/Clock) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa;
            -webkit-user-select: none; /* Mobile app feel */
            user-select: none;
        }
        
        /* Custom Scrollbar for Timeline */
        .timeline-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .timeline-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 4px;
        }

        /* Pastel Colors for Subjects */
        .bg-subject-korean { background-color: #fca5a5; } /* Red-200ish */
        .bg-subject-math { background-color: #fde047; } /* Yellow-200ish */
        .bg-subject-social { background-color: #86efac; } /* Green-200ish */
        .bg-subject-science { background-color: #93c5fd; } /* Blue-200ish */
        .bg-subject-english { background-color: #d8b4fe; } /* Purple-200ish */

        .text-subject-korean { color: #dc2626; }
        .text-subject-math { color: #ca8a04; }
        .text-subject-social { color: #16a34a; }
        .text-subject-science { color: #2563eb; }
        .text-subject-english { color: #9333ea; }

        /* App container to simulate mobile view on desktop if needed, otherwise full */
        #app-container {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            height: 100vh;
            width: 100%;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            background: white;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        /* Bottom Navigation */
        .bottom-nav {
            height: 60px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 50;
        }
        
        .nav-item {
            color: #94a3b8;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: #f97316; /* Orange-500 */
        }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        /* Timeline Marker */
        .current-time-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 2px solid #ef4444;
            z-index: 20;
            pointer-events: none;
        }
        .current-time-line::before {
            content: '';
            position: absolute;
            left: -5px;
            top: -5px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <!-- 1. LOGIN SCREEN -->
    <div id="login-screen" class="screen active justify-center items-center bg-gray-900">
        <div class="text-center text-white">
            <div class="text-6xl mb-4">🔥</div>
            <h1 class="text-3xl font-bold mb-2">대건 열품타</h1>
            <p class="text-gray-400 mb-10">대건고등학교 학생들의 열정 타이머</p>
            <button id="google-login-btn" class="bg-white text-gray-700 px-6 py-3 rounded-full shadow-lg font-medium hover:bg-gray-100 transition flex items-center gap-2 mx-auto">
                <i class="fab fa-google text-red-500"></i> 구글 계정으로 시작하기
            </button>
        </div>
    </div>

    <!-- 2. NICKNAME SETUP SCREEN -->
    <div id="nickname-screen" class="screen justify-center items-center p-6">
        <div class="w-full max-w-sm">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">닉네임 설정</h2>
            <p class="text-sm text-gray-500 mb-2">대건 열품타에서 사용할 닉네임을 정해주세요.</p>
            <input type="text" id="nickname-input" placeholder="닉네임 (2~8자)" class="w-full border-b-2 border-orange-500 p-2 outline-none text-lg mb-4">
            <p id="nickname-error" class="text-red-500 text-sm mb-6 hidden"></p>
            <button id="nickname-confirm-btn" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold shadow hover:bg-orange-600">
                시작하기
            </button>
        </div>
    </div>

    <!-- 3. MAIN APP (Home, Group, Settings) -->
    <div id="main-app" class="screen">
        
        <!-- HEADER (Shared) -->
        <header class="h-14 flex items-center justify-between px-4 bg-white border-b z-20">
            <div class="font-bold text-lg text-orange-500">대건 열품타</div>
            <div class="flex items-center gap-3">
                <button id="dday-display" class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-md font-bold cursor-pointer">
                    D-Day 설정
                </button>
                <div id="header-profile" class="w-8 h-8 rounded-full bg-gray-200 overflow-hidden cursor-pointer border border-gray-300">
                    <img id="header-profile-img" src="" class="w-full h-full object-cover">
                </div>
            </div>
        </header>

        <!-- VIEW: HOME -->
        <div id="view-home" class="flex-1 flex overflow-hidden relative">
            
            <!-- LEFT: TIMELINE -->
            <div class="w-1/3 h-full border-r bg-gray-50 overflow-y-auto timeline-scroll relative" id="timeline-container">
                <!-- Grid Lines (00~23) -->
                <div id="timeline-grid" class="relative h-[1440px]"> 
                    <!-- Generated by JS -->
                </div>
                <!-- Red Line for Current Time -->
                <div id="current-time-indicator" class="current-time-line hidden"></div>
                <!-- Study Blocks -->
                <div id="timeline-blocks"></div>
            </div>

            <!-- RIGHT: CONTROLS -->
            <div class="w-2/3 h-full flex flex-col p-4 bg-white relative">
                
                <!-- D-Day (Large) -->
                <div id="dday-large" class="mb-6 cursor-pointer">
                    <h3 class="text-gray-400 text-xs">목표일까지</h3>
                    <div class="flex items-baseline gap-2">
                        <span id="dday-count" class="text-3xl font-bold text-gray-800">D-?</span>
                        <span id="dday-title" class="text-sm text-gray-600">터치하여 설정</span>
                    </div>
                </div>

                <!-- Subjects Grid -->
                <div class="flex-1">
                    <h3 class="text-gray-400 text-xs mb-2">과목 선택</h3>
                    <div class="grid grid-cols-2 gap-3" id="subject-grid">
                        <button class="subject-btn p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col items-center justify-center gap-1 transition-all" data-subject="korean" data-color="bg-subject-korean">
                            <i class="fas fa-book text-gray-400"></i>
                            <span class="text-sm font-medium">국어</span>
                        </button>
                        <button class="subject-btn p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col items-center justify-center gap-1 transition-all" data-subject="math" data-color="bg-subject-math">
                            <i class="fas fa-calculator text-gray-400"></i>
                            <span class="text-sm font-medium">수학</span>
                        </button>
                        <button class="subject-btn p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col items-center justify-center gap-1 transition-all" data-subject="social" data-color="bg-subject-social">
                            <i class="fas fa-globe-asia text-gray-400"></i>
                            <span class="text-sm font-medium">사회</span>
                        </button>
                        <button class="subject-btn p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col items-center justify-center gap-1 transition-all" data-subject="science" data-color="bg-subject-science">
                            <i class="fas fa-flask text-gray-400"></i>
                            <span class="text-sm font-medium">과학</span>
                        </button>
                        <button class="subject-btn col-span-2 p-3 rounded-xl border border-gray-100 shadow-sm flex flex-col items-center justify-center gap-1 transition-all" data-subject="english" data-color="bg-subject-english">
                            <i class="fas fa-font text-gray-400"></i>
                            <span class="text-sm font-medium">영어</span>
                        </button>
                    </div>
                </div>

                <!-- Start Button (Bottom Center of Right Panel) -->
                <div class="mt-auto pt-4 flex justify-center">
                    <button id="start-study-btn" class="w-full py-4 rounded-2xl bg-gray-200 text-gray-400 font-bold shadow-md transition-all duration-300" disabled>
                        과목을 선택하세요
                    </button>
                </div>
            </div>
        </div>

        <!-- VIEW: GROUP -->
        <div id="view-group" class="flex-1 flex flex-col hidden overflow-hidden bg-gray-50">
            <div class="p-4 overflow-y-auto flex-1" id="group-list-container">
                <!-- Group List Items -->
            </div>
            <!-- FAB -->
            <button id="create-group-fab" class="absolute bottom-20 right-4 bg-orange-500 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-orange-600 z-40">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- VIEW: SETTINGS -->
        <div id="view-settings" class="flex-1 flex flex-col hidden p-4 bg-gray-50">
            <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center gap-4">
                <img id="settings-profile-img" src="" class="w-16 h-16 rounded-full object-cover">
                <div>
                    <h2 id="settings-nickname" class="text-xl font-bold">닉네임</h2>
                    <p id="settings-email" class="text-xs text-gray-500">email@example.com</p>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <button id="settings-change-nick" class="w-full text-left p-4 border-b hover:bg-gray-50 flex justify-between">
                    <span>닉네임 변경</span>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </button>
                <button id="settings-logout" class="w-full text-left p-4 text-red-500 hover:bg-gray-50">
                    로그아웃
                </button>
            </div>
            <div class="mt-8 text-center text-xs text-gray-400">
                대건고등학교 열품타 v1.0
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-target="view-home">
                <i class="fas fa-home text-xl mb-1"></i>
                <span>홈</span>
            </div>
            <div class="nav-item" data-target="view-group">
                <i class="fas fa-users text-xl mb-1"></i>
                <span>그룹</span>
            </div>
            <div class="nav-item" data-target="view-settings">
                <i class="fas fa-cog text-xl mb-1"></i>
                <span>설정</span>
            </div>
        </nav>
    </div>

    <!-- 4. STUDY SCREEN -->
    <div id="study-screen" class="screen bg-gray-900 text-white justify-center items-center z-50">
        <div class="absolute top-6 left-6 text-sm text-gray-400">
            <i class="fas fa-wifi text-green-500 mr-2"></i> LIVE
        </div>
        
        <div class="text-center mb-10">
            <div id="study-subject-badge" class="inline-block px-3 py-1 rounded-full text-sm font-bold mb-4 bg-gray-700 text-gray-300">
                과목
            </div>
            <div id="study-timer" class="text-6xl font-mono font-bold tracking-wider mb-2">00:00:00</div>
            <p class="text-gray-400 text-sm">현재 공부 중</p>
        </div>

        <button id="stop-study-btn" class="mb-12 w-20 h-20 rounded-full bg-red-500 text-white text-2xl shadow-lg shadow-red-500/50 flex items-center justify-center hover:scale-105 transition">
            <i class="fas fa-stop"></i>
        </button>

        <!-- Live Ranking -->
        <div class="w-full max-w-md px-6">
            <h3 class="text-xs text-gray-500 mb-2 uppercase tracking-wide">실시간 대건고 랭킹</h3>
            <div id="ranking-list" class="space-y-3">
                <!-- Ranking Items Generated by JS -->
            </div>
        </div>
    </div>

</div>

<!-- MODALS -->

<!-- D-Day Modal -->
<div id="modal-dday" class="modal-overlay">
    <div class="bg-white rounded-xl p-6 w-80 shadow-2xl">
        <h3 class="text-lg font-bold mb-4">D-Day 설정</h3>
        <input type="text" id="dday-input-title" placeholder="시험 이름 (예: 기말고사)" class="w-full border p-2 rounded mb-3">
        <input type="date" id="dday-input-date" class="w-full border p-2 rounded mb-4">
        <div class="flex gap-2">
            <button class="flex-1 bg-gray-200 py-2 rounded text-gray-700" onclick="closeModal('modal-dday')">취소</button>
            <button id="save-dday-btn" class="flex-1 bg-orange-500 py-2 rounded text-white font-bold">저장</button>
        </div>
    </div>
</div>

<!-- Create Group Modal -->
<div id="modal-create-group" class="modal-overlay">
    <div class="bg-white rounded-xl p-6 w-80 shadow-2xl">
        <h3 class="text-lg font-bold mb-4">새 그룹 만들기</h3>
        <input type="text" id="group-name-input" placeholder="그룹 이름" class="w-full border p-2 rounded mb-4">
        <div class="flex gap-2">
            <button class="flex-1 bg-gray-200 py-2 rounded text-gray-700" onclick="closeModal('modal-create-group')">취소</button>
            <button id="confirm-create-group-btn" class="flex-1 bg-orange-500 py-2 rounded text-white font-bold">생성</button>
        </div>
    </div>
</div>

<!-- Invite Friend Modal -->
<div id="modal-invite" class="modal-overlay">
    <div class="bg-white rounded-xl p-6 w-80 shadow-2xl">
        <h3 class="text-lg font-bold mb-2">친구 초대하기</h3>
        <p class="text-xs text-gray-500 mb-4">친구의 정확한 닉네임을 입력하세요.</p>
        <div class="flex gap-2 mb-2">
            <input type="text" id="invite-input-nick" placeholder="친구 닉네임" class="flex-1 border p-2 rounded">
            <button id="invite-search-btn" class="bg-gray-800 text-white px-3 rounded"><i class="fas fa-search"></i></button>
        </div>
        <div id="invite-result" class="text-sm py-2 text-center text-gray-600 min-h-[1.5rem]"></div>
        <div class="flex gap-2 mt-2">
            <button class="flex-1 bg-gray-200 py-2 rounded text-gray-700" onclick="closeModal('modal-invite')">닫기</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, onSnapshot, query, where, getDocs, addDoc, arrayUnion, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyAi2JnoYTKkaRf9NYbeeA3xkZ5jiT7DB-8",
        authDomain: "dg-yeolpumta.firebaseapp.com",
        projectId: "dg-yeolpumta",
        storageBucket: "dg-yeolpumta.firebasestorage.app",
        messagingSenderId: "575142322137",
        appId: "1:575142322137:web:c97d72b7934ff2584d03c8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- STATE ---
    let currentUser = null;
    let currentUserData = null;
    let selectedSubject = null;
    let timerInterval = null;
    let studyStartTime = null;
    let selectedGroupId = null; // For invitation logic
    
    // Profanity Filter (Simple List)
    const badWords = ["바보", "멍청이", "시발", "병신", "개새끼", "쓰레기", "존나", "미친"]; // 예시입니다.

    // Color Mapping
    const subjectColors = {
        'korean': { bg: 'bg-subject-korean', text: 'text-subject-korean', name: '국어', css: '#fca5a5' },
        'math': { bg: 'bg-subject-math', text: 'text-subject-math', name: '수학', css: '#fde047' },
        'social': { bg: 'bg-subject-social', text: 'text-subject-social', name: '사회', css: '#86efac' },
        'science': { bg: 'bg-subject-science', text: 'text-subject-science', name: '과학', css: '#93c5fd' },
        'english': { bg: 'bg-subject-english', text: 'text-subject-english', name: '영어', css: '#d8b4fe' }
    };

    // --- DOM ELEMENTS ---
    const screens = {
        login: document.getElementById('login-screen'),
        nickname: document.getElementById('nickname-screen'),
        main: document.getElementById('main-app'),
        study: document.getElementById('study-screen')
    };

    // --- AUTHENTICATION ---
    document.getElementById('google-login-btn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            console.error("Login failed", error);
            alert("로그인에 실패했습니다.");
        }
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await checkUserProfile(user.uid);
        } else {
            currentUser = null;
            currentUserData = null;
            showScreen('login');
        }
    });

    async function checkUserProfile(uid) {
        const userRef = doc(db, "users", uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
            currentUserData = userSnap.data();
            // Check if currently studying (session recovery)
            if (currentUserData.isStudying) {
                // Recover session logic could go here, for now just reset
                await updateDoc(userRef, { isStudying: false });
            }
            setupApp();
            showScreen('main');
        } else {
            // New user
            showScreen('nickname');
        }
    }

    // --- NICKNAME LOGIC ---
    document.getElementById('nickname-confirm-btn').addEventListener('click', handleNicknameSubmit);
    
    // Reuse for Profile Change
    document.getElementById('settings-change-nick').addEventListener('click', () => {
        // Check 30 day limit
        const lastUpdate = currentUserData.lastNicknameUpdate ? currentUserData.lastNicknameUpdate.toDate() : new Date(0);
        const now = new Date();
        const diffDays = Math.floor((now - lastUpdate) / (1000 * 60 * 60 * 24));
        
        if (diffDays < 30) {
            alert(`닉네임은 30일에 한 번만 변경할 수 있습니다.\n남은 기간: ${30 - diffDays}일`);
            return;
        }
        
        // Show nickname screen in update mode
        screens.main.classList.remove('active');
        screens.nickname.classList.add('active');
    });

    async function handleNicknameSubmit() {
        const input = document.getElementById('nickname-input');
        const errorMsg = document.getElementById('nickname-error');
        const nickname = input.value.trim();

        errorMsg.classList.add('hidden');

        // Validation
        if (nickname.length < 2 || nickname.length > 8) {
            showNickError("2~8글자로 입력해주세요.");
            return;
        }
        if (badWords.some(word => nickname.includes(word))) {
            showNickError("부적절한 단어가 포함되어 있습니다.");
            return;
        }

        // Duplication Check
        const q = query(collection(db, "users"), where("nickname", "==", nickname));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
            showNickError("이미 존재하는 닉네임입니다.");
            return;
        }

        // Save User
        try {
            const userData = {
                nickname: nickname,
                email: currentUser.email,
                photoURL: currentUser.photoURL,
                totalStudyTime: currentUserData ? currentUserData.totalStudyTime : 0, // Keep time if updating
                lastNicknameUpdate: serverTimestamp(),
                ddayTitle: currentUserData ? currentUserData.ddayTitle : "시험",
                ddayDate: currentUserData ? currentUserData.ddayDate : null,
                isStudying: false
            };

            await setDoc(doc(db, "users", currentUser.uid), userData, { merge: true });
            
            currentUserData = { ...currentUserData, ...userData }; // Local update
            setupApp();
            showScreen('main');
            input.value = "";
        } catch (e) {
            console.error(e);
            showNickError("오류가 발생했습니다.");
        }
    }

    function showNickError(msg) {
        const el = document.getElementById('nickname-error');
        el.innerText = msg;
        el.classList.remove('hidden');
    }

    // --- APP UI SETUP ---
    function setupApp() {
        // Profile Info
        document.getElementById('header-profile-img').src = currentUser.photoURL;
        document.getElementById('settings-profile-img').src = currentUser.photoURL;
        document.getElementById('settings-nickname').innerText = currentUserData.nickname;
        document.getElementById('settings-email').innerText = currentUser.email;

        // D-Day
        renderDDay();

        // Timeline Setup
        initTimeline();
        loadStudyLogs();

        // Listeners
        setupTabNavigation();
        loadGroups();
    }

    // --- TIMELINE ---
    function initTimeline() {
        const grid = document.getElementById('timeline-grid');
        grid.innerHTML = '';
        
        for (let i = 0; i < 24; i++) {
            const div = document.createElement('div');
            div.className = "absolute w-full border-t border-gray-200 text-xs text-gray-400 pl-1";
            div.style.top = `${(i / 24) * 100}%`;
            div.style.height = `${(1/24) * 100}%`;
            div.innerText = `${i}:00`;
            grid.appendChild(div);
        }

        // Red Line Updater
        updateTimeLine();
        setInterval(updateTimeLine, 60000);
    }

    function updateTimeLine() {
        const now = new Date();
        const minutes = now.getHours() * 60 + now.getMinutes();
        const percent = (minutes / 1440) * 100;
        
        const line = document.getElementById('current-time-indicator');
        line.style.top = `${percent}%`;
        line.classList.remove('hidden');
    }

    function renderStudyBlock(subject, startTime, endTime) {
        const startMin = startTime.getHours() * 60 + startTime.getMinutes();
        const endMin = endTime.getHours() * 60 + endTime.getMinutes();
        const duration = endMin - startMin;
        
        if (duration <= 0) return;

        const container = document.getElementById('timeline-blocks');
        const block = document.createElement('div');
        const colorClass = subjectColors[subject] ? subjectColors[subject].bg : 'bg-gray-300';
        
        block.className = `absolute left-8 right-0 ${colorClass} opacity-80 border-l-2 border-white`;
        block.style.top = `${(startMin / 1440) * 100}%`;
        block.style.height = `${(duration / 1440) * 100}%`;
        
        container.appendChild(block);
    }

    async function loadStudyLogs() {
        // Basic: Fetch logs for today (simplified for demo: fetch last 20 logs)
        // In real app: query by date range
        const logsRef = collection(db, "study_logs");
        const q = query(
            logsRef, 
            where("uid", "==", currentUser.uid),
            orderBy("startTime", "desc"),
            limit(20)
        );

        const snapshot = await getDocs(q);
        document.getElementById('timeline-blocks').innerHTML = ''; // Clear

        const today = new Date().toDateString();

        snapshot.forEach(doc => {
            const data = doc.data();
            const start = data.startTime.toDate();
            const end = data.endTime.toDate();
            
            // Only show today's logs
            if (start.toDateString() === today) {
                renderStudyBlock(data.subject, start, end);
            }
        });
    }

    // --- SUBJECT SELECTION ---
    const subjectBtns = document.querySelectorAll('.subject-btn');
    const startBtn = document.getElementById('start-study-btn');

    subjectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            // Reset others
            subjectBtns.forEach(b => {
                b.classList.remove('ring-2', 'ring-orange-400', 'bg-opacity-100');
                b.classList.add('bg-white');
                const color = b.getAttribute('data-color');
                b.classList.remove(color);
            });

            // Select this one
            const subject = btn.getAttribute('data-subject');
            const colorInfo = subjectColors[subject];
            
            btn.classList.remove('bg-white');
            btn.classList.add(colorInfo.bg, 'ring-2', 'ring-orange-400');
            
            selectedSubject = subject;
            
            // Update Start Button
            startBtn.disabled = false;
            startBtn.innerText = `${colorInfo.name} 공부 시작하기`;
            startBtn.className = `w-full py-4 rounded-2xl font-bold shadow-md transition-all duration-300 text-white ${colorInfo.bg.replace('bg-', 'bg-').replace('200', '500')}`; // Use darker shade for button
            
            // Tailwind doesn't have -500 for custom subject classes, hardcoding button colors mapping
            const btnColorMap = {
                'korean': 'bg-red-400',
                'math': 'bg-yellow-400',
                'social': 'bg-green-400',
                'science': 'bg-blue-400',
                'english': 'bg-purple-400'
            };
            startBtn.className = `w-full py-4 rounded-2xl font-bold shadow-md transition-all duration-300 text-white ${btnColorMap[subject]} hover:opacity-90`;
        });
    });

    // --- STUDY MODE ---
    startBtn.addEventListener('click', async () => {
        if (!selectedSubject) return;
        
        studyStartTime = new Date();
        
        // Update Firestore status
        await updateDoc(doc(db, "users", currentUser.uid), {
            isStudying: true,
            currentSubject: selectedSubject
        });

        // UI Transition
        showScreen('study');
        
        const subjInfo = subjectColors[selectedSubject];
        document.getElementById('study-subject-badge').innerText = subjInfo.name;
        document.getElementById('study-subject-badge').style.color = subjInfo.css;

        // Timer
        let seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('study-timer').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // Start Ranking Listener
        startRankingListener();
    });

    document.getElementById('stop-study-btn').addEventListener('click', async () => {
        clearInterval(timerInterval);
        const endTime = new Date();
        const durationSec = Math.floor((endTime - studyStartTime) / 1000); // seconds

        // Stop UI
        showScreen('main');
        
        // Update Firestore
        // 1. Add Log
        await addDoc(collection(db, "study_logs"), {
            uid: currentUser.uid,
            subject: selectedSubject,
            startTime: studyStartTime,
            endTime: endTime,
            duration: durationSec
        });

        // 2. Update User Total Time & Status
        await updateDoc(doc(db, "users", currentUser.uid), {
            isStudying: false,
            currentSubject: null,
            totalStudyTime: (currentUserData.totalStudyTime || 0) + durationSec
        });
        
        currentUserData.totalStudyTime += durationSec;
        
        // Refresh Timeline
        loadStudyLogs();
        stopRankingListener();
    });

    let rankingUnsub = null;
    function startRankingListener() {
        const q = query(collection(db, "users"), orderBy("totalStudyTime", "desc"), limit(5));
        rankingUnsub = onSnapshot(q, (snapshot) => {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            
            snapshot.forEach((doc, index) => {
                const u = doc.data();
                const totalSec = u.totalStudyTime + (u.isStudying ? 0 : 0); // Simplified (real-time increment is complex)
                
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                
                const div = document.createElement('div');
                div.className = "flex items-center bg-gray-800 p-3 rounded-lg";
                div.innerHTML = `
                    <div class="text-orange-500 font-bold w-6 text-center mr-3 text-lg">${index + 1}</div>
                    <img src="${u.photoURL}" class="w-8 h-8 rounded-full mr-3">
                    <div class="flex-1">
                        <div class="text-sm font-medium text-white">${u.nickname}</div>
                        <div class="text-xs text-gray-400">${u.isStudying ? '<span class="text-green-400">공부 중</span>' : '쉬는 중'}</div>
                    </div>
                    <div class="text-white font-mono text-sm">${h}시간 ${m}분</div>
                `;
                list.appendChild(div);
            });
        });
    }

    function stopRankingListener() {
        if (rankingUnsub) rankingUnsub();
    }

    // --- D-DAY ---
    document.getElementById('dday-display').addEventListener('click', () => openModal('modal-dday'));
    document.getElementById('dday-large').addEventListener('click', () => openModal('modal-dday'));

    function renderDDay() {
        const titleEl = document.getElementById('dday-title');
        const countEl = document.getElementById('dday-count');
        
        if (!currentUserData.ddayDate) {
            countEl.innerText = "D-Day";
            titleEl.innerText = "터치하여 설정하세요";
            return;
        }

        const target = new Date(currentUserData.ddayDate);
        const today = new Date();
        target.setHours(0,0,0,0);
        today.setHours(0,0,0,0);
        
        const diff = target - today;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        
        let text = "";
        if (days > 0) text = `D-${days}`;
        else if (days === 0) text = "D-Day";
        else text = `D+${Math.abs(days)}`;

        countEl.innerText = text;
        titleEl.innerText = currentUserData.ddayTitle;
    }

    document.getElementById('save-dday-btn').addEventListener('click', async () => {
        const title = document.getElementById('dday-input-title').value;
        const date = document.getElementById('dday-input-date').value;
        
        if (!title || !date) return alert("내용을 입력해주세요");

        await updateDoc(doc(db, "users", currentUser.uid), {
            ddayTitle: title,
            ddayDate: date
        });

        currentUserData.ddayTitle = title;
        currentUserData.ddayDate = date;
        renderDDay();
        closeModal('modal-dday');
    });

    // --- GROUPS ---
    function loadGroups() {
        const q = query(collection(db, "groups"), where("members", "array-contains", currentUser.uid));
        
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('group-list-container');
            container.innerHTML = '';
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-10">가입된 그룹이 없습니다.<br>+ 버튼을 눌러 그룹을 만들어보세요.</div>';
                return;
            }

            snapshot.forEach(gDoc => {
                const g = gDoc.data();
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm mb-3";
                
                // Invite Button (Only for Leader)
                let inviteHtml = '';
                if (g.leaderUid === currentUser.uid) {
                    inviteHtml = `<button class="invite-btn text-xs bg-gray-100 px-2 py-1 rounded text-gray-600 hover:bg-gray-200" data-gid="${gDoc.id}"><i class="fas fa-user-plus"></i> 친구 초대</button>`;
                }

                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg text-gray-800">${g.name}</h3>
                        ${inviteHtml}
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-500">
                        <i class="fas fa-user"></i> ${g.members.length}명 참여중
                    </div>
                `;
                container.appendChild(div);
            });

            // Add Invite Listeners
            document.querySelectorAll('.invite-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    selectedGroupId = e.target.closest('button').dataset.gid;
                    openModal('modal-invite');
                });
            });
        });
    }

    document.getElementById('create-group-fab').addEventListener('click', () => openModal('modal-create-group'));

    document.getElementById('confirm-create-group-btn').addEventListener('click', createGroup);
    document.getElementById('group-name-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') createGroup();
    });

    async function createGroup() {
        const name = document.getElementById('group-name-input').value;
        if (!name) return;

        await addDoc(collection(db, "groups"), {
            name: name,
            leaderUid: currentUser.uid,
            members: [currentUser.uid],
            createdAt: serverTimestamp()
        });
        
        closeModal('modal-create-group');
        document.getElementById('group-name-input').value = "";
    }

    // Invite Logic
    document.getElementById('invite-search-btn').addEventListener('click', async () => {
        const nick = document.getElementById('invite-input-nick').value;
        const resDiv = document.getElementById('invite-result');
        
        const q = query(collection(db, "users"), where("nickname", "==", nick));
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
            resDiv.innerHTML = "<span class='text-red-500'>사용자를 찾을 수 없습니다.</span>";
        } else {
            const userDoc = snapshot.docs[0];
            const uid = userDoc.id;
            
            // Add to group
            await updateDoc(doc(db, "groups", selectedGroupId), {
                members: arrayUnion(uid)
            });
            
            resDiv.innerHTML = "<span class='text-green-500'>초대되었습니다!</span>";
        }
    });

    // --- NAVIGATION & UTILS ---
    function setupTabNavigation() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const targetId = item.getAttribute('data-target');
                
                // UI Toggle
                document.querySelectorAll('#main-app > div[id^="view-"]').forEach(v => v.classList.add('hidden'));
                document.getElementById(targetId).classList.remove('hidden');
                
                // Nav Active State
                navItems.forEach(n => n.classList.remove('active'));
                item.classList.add('active');
            });
        });
        
        // Settings Logout
        document.getElementById('settings-logout').addEventListener('click', () => {
            signOut(auth);
            location.reload();
        });
    }

    function showScreen(name) {
        Object.values(screens).forEach(el => el.classList.remove('active'));
        screens[name].classList.add('active');
    }

    // Modal Helpers
    window.openModal = (id) => document.getElementById(id).classList.add('active');
    window.closeModal = (id) => {
        document.getElementById(id).classList.remove('active');
        // Clear inputs
        document.querySelectorAll(`#${id} input`).forEach(i => i.value = '');
        const res = document.getElementById('invite-result');
        if(res) res.innerHTML = '';
    }

</script>

</body>
</html>
